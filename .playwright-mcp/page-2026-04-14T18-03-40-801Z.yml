            - generic [ref=e24]: Content Strategy · Localization · Taxonomy Design
          - heading "Unifying naming architecture across Messenger and Instagram" [level=1] [ref=e25]
        - paragraph [ref=e26]: Reconciling two years of fractured, redundant naming across Instagram and Messenger into a single unified taxonomy — localization-ready and built to scale across Meta’s community ecosystem.
      - generic [ref=e28]:
        - generic [ref=e29]: Role
        - paragraph [ref=e30]: I represented Messenger’s community messaging pillar as part of a cross-functional v-team of content designers spanning Instagram and Messenger. While the taxonomy work was collaborative, I owned the naming architecture for my product area and drove alignment across teams, brokering agreement between Instagram and Messenger on shared vocabulary, and leading the linguistic audit that became the foundation for the unified system.
    - img "Naming architecture unification project" [ref=e32]
  - generic [ref=e35]:
    - generic [ref=e36]: Challenge
    - paragraph [ref=e37]: As Messenger and Instagram Community products evolved in parallel, so did their vocabularies. By 2024, we had “Channels,” “Chats,” “Groups,” and “Communities” all performing similar functions but using different names — sometimes even within the same app. This wasn’t just a branding issue; it was causing user confusion, localization bloat, and making cross-app feature parity impossible to explain.
  - generic [ref=e40]:
    - generic [ref=e41]: Solutions
    - generic [ref=e42]:
      - generic [ref=e43]:
        - generic [ref=e44]:
          - generic [ref=e45]: "01"
          - paragraph [ref=e46]: Architecting “community” as a meta-primitive
          - paragraph [ref=e47]: "The core problem was structural: “community” meant different things to different teams. I led cross-functional efforts to redefine it not as a UI container but as a shared audience identity — a membership anyone could join around shared interests. This freed social connections to scale across diverse messaging objects without forcing users into a single rigid UI structure."
        - 'button "Enlarge: Community hierarchy diagram: the chatnel matrix" [ref=e48] [cursor=pointer]':
          - img "Architectural diagram showing how community, channel, and chat relate as structural primitives" [ref=e49]
      - generic [ref=e50]:
        - generic [ref=e51]:
          - generic [ref=e52]: "02"
          - paragraph [ref=e53]: Developing a unified product taxonomy
          - paragraph [ref=e54]: "I conducted a comprehensive linguistic audit to eliminate term drift and redundant naming patterns across both apps. The goal was a single source of truth: consistent terms, consistent definitions, consistent behavior — regardless of which app you were in."
          - generic [ref=e55]:
            - paragraph [ref=e56]: Taxonomy reduced from 6 terms to 4
            - paragraph [ref=e57]: First-ever terminology alignment between Instagram and Messenger for community messaging products
