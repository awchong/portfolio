          - paragraph [ref=e66]: Future-proofing for new verticals
          - paragraph [ref=e67]: The naming system needed to scale beyond general-interest communities into segment-specific models like schools and subscriptions — without requiring new naming conventions each time. I built the architecture to accommodate new verticals by design, not by exception.
